<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Universidad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div id="navbar"></div>
    
    <section class="container py-5">
        <h2 class="mb-4 text-center text-primary fw-bold">Contacto</h2>
        <div class="row justify-content-center">
            <div class="col-lg-7 col-md-9">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-4">
                        <form id="contactForm">
                            <div class="mb-3">
                                <label for="nombre" class="form-label fw-semibold">Nombre</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-primary text-white"><i class="fa fa-user"></i></span>
                                    <input type="text" class="form-control" id="nombre" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">Correo electrónico</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-primary text-white"><i class="fa fa-envelope"></i></span>
                                    <input type="email" class="form-control" id="email" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="mensaje" class="form-label fw-semibold">Mensaje</label>
                                <textarea class="form-control" id="mensaje" rows="4" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold">Enviar <i class="fa fa-paper-plane ms-1"></i></button>
                            <div id="successMsg" class="alert alert-success mt-3 d-none" role="alert">
                                ¡Mensaje enviado correctamente!
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mt-5">
            <div class="col-md-6 mx-auto text-center">
                <div class="card border-0 shadow-sm bg-light rounded-4 p-3">
                    <h5 class="fw-bold mb-3 text-primary">Información de contacto</h5>
                    <p class="mb-1"><i class="fa fa-envelope text-primary me-2"></i> contacto@umss.edu.bo</p>
                    <p class="mb-1"><i class="fa fa-phone text-primary me-2"></i> +591 4 1234567</p>
                    <p><i class="fa fa-map-marker-alt text-primary me-2"></i> Av. Oquendo, Cochabamba, Bolivia</p>
                </div>
            </div>
        </div>
    </section>
    <div id="footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="../js/script.js"></script>
    <script>
        // Mensaje de éxito al enviar el formulario
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('successMsg').classList.remove('d-none');
            this.reset();
            setTimeout(() => {
                document.getElementById('successMsg').classList.add('d-none');
            }, 3500);
        });
    </script>
</body>
</html>
