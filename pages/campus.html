<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrantes - UMSS</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- 🔹 NAVBAR -->
    <div id="navbar"></div>

    <!-- 🔹 CAMPUS -->
    <section id="campus" class="p-5 bg-light">
        <div class="container text-center">
            <h2 class="fw-bold mb-5">Explora Nuestras Facultades</h2>

            <!-- g-4 añade separación (gutter) entre las tarjetas -->
            <div class="row row-cols-2 g-4 justify-content-center">
                
                <!-- Facultad de Medicina -->
                <div class="col">
                    <div class="faculty-card shadow-sm bg-white p-3 rounded">
                        <h5 class="mb-3 fw-bold">Medicina</h5>
                        <a href="facultadesCarreras/carreras_medicina.html">
                            <img src="../assets/img/medicina.jpg" class="img-fluid rounded faculty-img" alt="Facultad de Medicina">
                        </a>
                    </div>
                </div>

                <!-- Facultad de Tecnología -->
                <div class="col">
                    <div class="faculty-card shadow-sm bg-white p-3 rounded">
                        <h5 class="mb-3 fw-bold">Tecnología</h5>
                        <a href="carreras_facultades/carreras_tecno.html">
                            <img src="../assets/img/tecnologia.jpg" class="img-fluid rounded faculty-img" alt="Facultad de Tecnología">
                        </a>
                    </div>
                </div>

                <!-- Facultad de Derecho -->
                <div class="col">
                    <div class="faculty-card shadow-sm bg-white p-3 rounded">
                        <h5 class="mb-3 fw-bold">Derecho</h5>
                        <a href="carreras_facultades/carreras_derecho.html">
                            <img src="../assets/img/umss1.jpg" class="img-fluid rounded faculty-img" alt="Facultad de Derecho">
                        </a>
                    </div>
                </div>

                <!-- Facultad de Economía -->
                <div class="col">
                    <div class="faculty-card shadow-sm bg-white p-3 rounded">
                        <h5 class="mb-3 fw-bold">Economía</h5>
                        <a href="carreras_facultades/carreras_eco.html">
                            <img src="../assets/img/umss3.jpg" class="img-fluid rounded faculty-img" alt="Facultad de Economía">
                        </a>
                    </div>
                </div>

            </div>
            <p class="mt-5 text-muted">Haz clic en la imagen de la facultad para ver sus carreras disponibles.</p>
        </div>
    </section>

    <!-- 🔹 ESTILOS ADICIONALES (Puedes poner esto en tu styles.css) -->
    <style>
        .faculty-img {
            width: 100%;
            height: 200px; /* Tamaño fijo para uniformidad */
            object-fit: cover; /* Evita que la imagen se deforme */
            transition: transform 0.3s ease;
        }

        .faculty-card:hover .faculty-img {
            transform: scale(1.05); /* Efecto de zoom suave al pasar el mouse */
        }

        .faculty-card {
            transition: all 0.3s ease;
            border: 1px solid #eee;
        }

        .faculty-card:hover {
            border-color: #007bff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
        }
    </style>
    <!-- 🔹 FOOTER -->
    <div id="footer"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
